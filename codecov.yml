# Codecov: PR status checks + comments (https://docs.codecov.com/docs/commit-status)
# Requires CODECOV_TOKEN on GitHub and the Codecov GitHub App on the repo.

codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        informational: false
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: false
        only_pulls: true
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_head: true

github_checks:
  annotations: true
