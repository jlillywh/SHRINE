# Lint and format (roadmap 2.14)
name: Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Ruff lint (shrine + tests)
        run: ruff check src/shrine tests examples scripts

      - name: Ruff format
        run: ruff format --check src tests examples scripts
