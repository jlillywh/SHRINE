# Type checking (roadmap 2.12)
name: Typecheck

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Strict typecheck (shrine)
        run: mypy src/shrine

      - name: Basic typecheck (domain)
        run: mypy src/hydrology src/water_manage src/geometry src/inputs src/data
