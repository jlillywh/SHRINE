name: Feature request
description: Suggest a new capability, API, scenario, or documentation improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and proposed solution. Large framework changes should align with the
        [modernization roadmap](https://github.com/jlillywh/SHRINE/blob/master/docs/modernization-roadmap.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish? Who benefits?
      placeholder: As a hydrologist, I need to…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: API sketch, scenario idea, or doc outline
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or designs you considered
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - shrine.simulation API
        - domain model (hydrology / storage / network)
        - scenarios / reference library
        - documentation / tutorial
        - packaging / CI
        - other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this (guidance welcome)
          required: false
