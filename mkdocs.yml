# SHRINE documentation site (roadmap 3.1)
# Build locally: pip install -e ".[docs]" && mkdocs serve
# Strict build (CI): mkdocs build --strict

site_name: SHRINE
site_description: Simulation of Hydrology, Reservoirs, and Integrated Network Environments
site_url: https://jlillywh.github.io/SHRINE/
repo_url: https://github.com/jlillywh/SHRINE
repo_name: jlillywh/SHRINE
edit_uri: edit/master/docs/

copyright: Copyright &copy; SHRINE contributors — GNU GPL v3.0

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: spacy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            summary: true
            merge_init_into_class: true
            filters: ["!^__"]

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Get started:
      - Install: install.md
      - Quickstart: quickstart.md
      - Concepts: concepts.md
      - Architecture: architecture.md
  - Tutorials:
      - First watershed model: tutorial/first-watershed-model.md
  - Guides:
      - Simulation requirements: simulation-framework-requirements.md
      - Hydrology contracts: hydrology-contracts.md
      - Extending elements: extending-elements.md
      - Scenarios: scenarios.md
      - Step debugging: step-debugging.md
      - Results & recording: results-recording.md
      - Testing & CI: testing.md
      - API stability: api-stability.md
  - API reference:
      - Overview: api/index.md
      - shrine.simulation: api/simulation.md
      - Run orchestration: api/autogen/run-orchestration.md
      - Time and context: api/autogen/time-and-context.md
      - Units: api/autogen/units.md
      - Elements and adapters: api/autogen/elements.md
      - Inputs: api/autogen/inputs.md
      - Flow and mass balance: api/autogen/flow-balance.md
      - Scenarios and recording: api/autogen/scenarios.md
      - Metadata, manifest, and RNG: api/autogen/metadata.md
      - Errors and deprecation: api/autogen/errors.md
  - Project:
      - Comparison with other tools: comparison.md
      - Modernization roadmap: modernization-roadmap.md
      - Project name: project-name.md
      - Secrets & hygiene: secrets-and-repo-hygiene.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jlillywh/SHRINE
