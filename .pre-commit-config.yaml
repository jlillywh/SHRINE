# Optional local hooks — install: pip install pre-commit && pre-commit install
# See docs/secrets-and-repo-hygiene.md

minimum_pre_commit_version: "3.0.0"

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        name: gitleaks (staged files)
        args: ["protect", "--staged", "--verbose", "--config", ".gitleaks.toml"]
