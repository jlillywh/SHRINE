# Optional local hooks — install: pip install pre-commit && pre-commit install
# See docs/secrets-and-repo-hygiene.md
#
# Upstream hook runs: gitleaks git --pre-commit --redact --staged --verbose
# Do not pass "protect" as an arg — that breaks git and causes:
#   fatal: cannot change to 'protect': No such file or directory

minimum_pre_commit_version: "3.0.0"

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        name: gitleaks (staged files)
        args: ["--config", ".gitleaks.toml"]
